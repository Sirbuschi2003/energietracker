services:
  energietracker:
    image: ghcr.io/sirbuschi2003/energietracker:latest
    container_name: energietracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - energietracker_data:/data
    environment:
      - PORT=3000
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  energietracker_data:
    driver: local
