services:
  energietracker:
    image: ghcr.io/sirbuschi2003/energietracker:latest
    container_name: energietracker
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - energietracker_data:/data
    environment:
      - PORT=3000
      - TZ=Europe/Berlin
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

volumes:
  energietracker_data:
    driver: local
